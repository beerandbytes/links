<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    /* ─────────────────────────────────────────
       DESIGN TOKENS
    ───────────────────────────────────────── */
    :root {
      --ink:       #0E0E0E;
      --paper:     #F2EFE9;
      --warm-mid:  #D9D4CB;
      --accent-1:  #C8F135;
      --accent-2:  #FF4D1C;
      --accent-3:  #1A1AFF;
      --accent-4:  #FFD600;
      --accent-5:  #FF9ECD;

      --border: 2.5px solid var(--ink);
      --radius: 18px;
      --gap: 12px;
      --shadow: 4px 4px 0px var(--ink);
      --shadow-press: 1px 1px 0px var(--ink);
    }

    /* ─────────────────────────────────────────
       BASE
    ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* cursor:none only on desktop — never block mobile */
    @media (pointer: fine) {
      body { cursor: none; }
      a, button, [role="button"], .card { cursor: none; }
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      background-color: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 20px 60px;
      background-image: radial-gradient(circle, rgba(14,14,14,0.12) 1.5px, transparent 1.5px);
      background-size: 24px 24px;
      /* CRITICAL: overflow-x hidden was clipping scroll hit areas */
      overflow-x: hidden;
    }

    /* ─────────────────────────────────────────
       CUSTOM CURSOR — FIXED IMPLEMENTATION
       Key rules:
       1. position:fixed, left:0, top:0 (anchor)
       2. translate3d(x, y, 0) positions it via JS
       3. -50% centering baked into the transform
       4. pointer-events:none — never blocks clicks
       5. NO mix-blend-mode (causes stacking issues)
       6. NO lerp / RAF loop (causes offset lag)
       7. Hidden by default, shown on first mousemove
    ───────────────────────────────────────── */
    #cursor {
      position: fixed;
      left: 0;
      top: 0;
      width: 14px;
      height: 14px;
      background: var(--ink);
      border-radius: 50%;
      pointer-events: none;        /* never intercepts clicks */
      z-index: 99999;
      /* The centering offset is part of the base transform */
      transform: translate3d(-100px, -100px, 0) translate(-50%, -50%);
      /* Only transition shape/color — NEVER position */
      transition:
        width  .22s cubic-bezier(0.34, 1, 0.5, 0.8),
        height .22s cubic-bezier(0.34, 1, 0.5, 0.8),
        border-radius .22s ease,
        background    .22s ease,
        opacity       .2s ease;
      opacity: 0;                  /* hidden until first mousemove */
      will-change: transform;
    }

    /* Expanded state when hovering interactive elements */
    #cursor.is-hovering {
      width: 16px;
      height: 16px;
      background: var(--accent-4);
      border-radius: 3px;
    }

    /* Pressed state */
    #cursor.is-pressing {
      width: 8px;
      height: 8px;
      background: var(--accent-2);
      border-radius: 50%;
    }

    /* ─────────────────────────────────────────
       BENTO GRID WRAPPER
    ───────────────────────────────────────── */
    .bento {
      width: 100%;
      max-width: 600px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--gap);
    }

    /* ─────────────────────────────────────────
       BASE CARD STYLES
    ───────────────────────────────────────── */
    .card {
      background: var(--paper);
      border: var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: popIn .5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      /* Tilt uses transform — keep will-change scoped */
      will-change: transform;
      /* Default transition for tilt reset */
      transition: box-shadow .15s ease, transform .5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .card:active {
      box-shadow: var(--shadow-press);
    }

    .span-2 { grid-column: span 2; }
    .span-1 { grid-column: span 1; }

    .card:nth-child(1)  { animation-delay: .05s; }
    .card:nth-child(2)  { animation-delay: .10s; }
    .card:nth-child(3)  { animation-delay: .15s; }
    .card:nth-child(4)  { animation-delay: .20s; }
    .card:nth-child(5)  { animation-delay: .25s; }
    .card:nth-child(6)  { animation-delay: .30s; }
    .card:nth-child(7)  { animation-delay: .35s; }
    .card:nth-child(8)  { animation-delay: .40s; }

    @keyframes popIn {
      from { opacity: 0; transform: translateY(16px) scale(.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1);   }
    }

    /* ─────────────────────────────────────────
       CARD 1 — HERO
    ───────────────────────────────────────── */
    .card-hero {
      background: var(--ink);
      color: var(--paper);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 28px;
    }

    .hero-left { flex: 1; }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-1);
      color: var(--ink);
      font-size: .68rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,.15);
      margin-bottom: 14px;
      letter-spacing: .06em;
    }

    .ping {
      width: 8px; height: 8px;
      background: var(--ink);
      border-radius: 50%;
      animation: pingAnim 1.4s ease-in-out infinite;
    }
    @keyframes pingAnim {
      0%,100% { transform: scale(1); opacity: 1; }
      50%      { transform: scale(1.5); opacity: .5; }
    }

    .hero-name {
      font-family: 'Instrument Serif', serif;
      font-size: 2.6rem;
      line-height: 1;
      letter-spacing: -.02em;
      margin-bottom: 10px;
    }
    .hero-name em { font-style: italic; color: var(--accent-1); }

    .hero-role {
      font-size: .72rem;
      color: rgba(242,239,233,.55);
      line-height: 1.6;
    }

    .hero-avatar {
      width: 72px; height: 72px;
      border-radius: 14px;
      background: var(--accent-1);
      border: 2.5px solid rgba(255,255,255,.2);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Instrument Serif', serif;
      font-size: 2rem;
      color: var(--ink);
      font-style: italic;
      position: relative;
      overflow: hidden;
    }
    .hero-avatar::after {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,.08) 3px, rgba(0,0,0,.08) 4px
      );
    }

    /* ─────────────────────────────────────────
       CARD 2 — GITHUB
    ───────────────────────────────────────── */
    .card-github {
      background: var(--ink);
      color: var(--paper);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 150px;
      transition: background .3s, box-shadow .15s ease, transform .5s cubic-bezier(0.34, 1.56, 0.64, 1);
      text-decoration: none;
    }
    .card-github:hover { background: #1a1a2e; }

    /* ─────────────────────────────────────────
       CARD 3 — LINKEDIN
    ───────────────────────────────────────── */
    .card-linkedin {
      background: var(--accent-3);
      color: var(--paper);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 150px;
      text-decoration: none;
    }

    /* ─────────────────────────────────────────
       CARD 4 — TICKER
    ───────────────────────────────────────── */
    .card-ticker {
      background: var(--accent-1);
      padding: 14px 0 !important;
      overflow: hidden;
      white-space: nowrap;
    }
    .ticker-inner {
      display: inline-flex;
      animation: tickerScroll 18s linear infinite;
    }
    .ticker-item {
      font-size: .8rem;
      font-weight: 700;
      color: var(--ink);
      padding: 0 24px;
      letter-spacing: .05em;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    @keyframes tickerScroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* ─────────────────────────────────────────
       CARD 5 — PORTFOLIO
    ───────────────────────────────────────── */
    .card-portfolio {
      background: var(--accent-2);
      color: var(--paper);
      min-height: 200px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-decoration: none;
      grid-column: span 1;
    }

    /* ─────────────────────────────────────────
       CARD 6 — CTA
    ───────────────────────────────────────── */
    .card-cta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 22px 28px;
    }

    .cta-text-label {
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .1em;
      opacity: .5;
      margin-bottom: 4px;
    }
    .cta-text-main {
      font-family: 'Instrument Serif', serif;
      font-size: 1.5rem;
      line-height: 1.15;
    }

    .cta-btn {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--ink);
      color: var(--paper);
      font-family: 'JetBrains Mono', monospace;
      font-size: .78rem;
      font-weight: 700;
      padding: 12px 20px;
      border-radius: 10px;
      border: var(--border);
      box-shadow: 3px 3px 0 var(--ink);
      text-decoration: none;
      letter-spacing: .04em;
      transition: transform .15s, box-shadow .15s, background .2s, color .2s;
    }
    .cta-btn:hover {
      background: var(--accent-1);
      color: var(--ink);
      box-shadow: 5px 5px 0 var(--ink);
    }
    .cta-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 var(--ink);
    }

    /* ─────────────────────────────────────────
       CARD 7 — RESUME
    ───────────────────────────────────────── */
    .card-resume {
      background: var(--accent-5);
      color: var(--ink);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 130px;
      text-decoration: none;
      grid-column: span 1;
    }

    /* ─────────────────────────────────────────
       CARD 8 — STACK
    ───────────────────────────────────────── */
    .card-stack {
      background: var(--warm-mid);
      padding: 20px 22px;
    }

    .stack-label {
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .12em;
      opacity: .5;
      margin-bottom: 14px;
    }

    .stack-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .stack-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--paper);
      border: 2px solid var(--ink);
      border-radius: 8px;
      padding: 5px 12px 5px 8px;
      font-size: .73rem;
      font-weight: 700;
      box-shadow: 2px 2px 0 var(--ink);
      transition: transform .15s, box-shadow .15s, background .2s;
    }
    .stack-pill:hover {
      transform: translate(-1px, -1px);
      box-shadow: 3px 3px 0 var(--ink);
      background: var(--accent-1);
    }
    .stack-pill svg { flex-shrink: 0; }

    /* ─────────────────────────────────────────
       SHARED CARD COMPONENTS
    ───────────────────────────────────────── */
    .card-icon-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .card-icon-wrap {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: rgba(255,255,255,.15);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .card-icon-wrap.dark  { background: rgba(0,0,0,.12); }

    .arrow-chip {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: rgba(255,255,255,.2);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .card:hover .arrow-chip { transform: translate(3px,-3px); }
    .arrow-chip.dark { background: rgba(0,0,0,.1); }

    .card-label {
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: .1em;
      opacity: .55;
      margin-bottom: 4px;
    }

    .card-title {
      font-family: 'Instrument Serif', serif;
      font-size: 1.3rem;
      line-height: 1.15;
      margin-bottom: 2px;
    }

    .card-sub {
      font-size: .7rem;
      opacity: .6;
      line-height: 1.5;
    }

    /* ─────────────────────────────────────────
       BURST DOTS
    ───────────────────────────────────────── */
    .burst-dot {
      position: fixed;
      width: 10px; height: 10px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      border: 2px solid var(--ink);
    }

    /* ─────────────────────────────────────────
       RESPONSIVE
    ───────────────────────────────────────── */
    @media (max-width: 480px) {
      body { padding: 20px 12px 40px; }
      .bento { grid-template-columns: 1fr; gap: 10px; }
      .span-2 { grid-column: span 1; }
      .hero-name { font-size: 2rem; }
      .card-cta { flex-direction: column; align-items: flex-start; }
      /* Restore native cursor on touch devices */
      #cursor { display: none; }
    }
  </style>
</head>

  <script>
    /* ═══════════════════════════════════════════════════
       CURSOR — Rebuilt from scratch
       Rule: write e.clientX/Y directly into translate3d.
       No lerp. No RAF. No intermediate variables.
       The centering (-50%,-50%) lives in CSS as a base
       transform, and we PREPEND the position in JS.
    ═══════════════════════════════════════════════════ */
    const cursor = document.getElementById('cursor');

    // Only activate on devices with a fine pointer (mouse)
    if (window.matchMedia('(pointer: fine)').matches) {

      // Show cursor on first real mouse movement
      let cursorVisible = false;

      window.addEventListener('mousemove', e => {
        // Direct, zero-lag position write
        // translate3d(posX, posY) then translate(-50%,-50%) centers it
        cursor.style.transform =
          `translate3d(${e.clientX}px, ${e.clientY}px, 0) translate(-50%, -50%)`;

        if (!cursorVisible) {
          cursor.style.opacity = '1';
          cursorVisible = true;
        }
      });

      // Hide when mouse leaves the window entirely
      document.addEventListener('mouseleave', () => {
        cursor.style.opacity = '0';
        cursorVisible = false;
      });
      document.addEventListener('mouseenter', () => {
        cursor.style.opacity = '1';
        cursorVisible = true;
      });

      // Expand on interactive hover
      const interactives = document.querySelectorAll(
        'a, button, .card, .stack-pill, .cta-btn'
      );
      interactives.forEach(el => {
        el.addEventListener('mouseenter', () => cursor.classList.add('is-hovering'));
        el.addEventListener('mouseleave', () => cursor.classList.remove('is-hovering'));
      });

      // Press state
      document.addEventListener('mousedown', () => {
        cursor.classList.remove('is-hovering');
        cursor.classList.add('is-pressing');
      });
      document.addEventListener('mouseup', () => {
        cursor.classList.remove('is-pressing');
        // Re-check if still hovering something
        const el = document.elementFromPoint(
          parseFloat(cursor.style.transform.match(/translate3d\(([^,]+)/)?.[1]) || 0,
          parseFloat(cursor.style.transform.match(/translate3d\([^,]+,\s*([^,]+)/)?.[1]) || 0
        );
        if (el?.closest('a, button, .card, .stack-pill, .cta-btn')) {
          cursor.classList.add('is-hovering');
        }
      });
    }

    /* ═══════════════════════════════════════════════════
       TILT — Safe 3D tilt that resets cleanly
       Uses mousemove relative to card bounds.
       Resets on mouseleave via CSS transition.
    ═══════════════════════════════════════════════════ */
    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('mousemove', e => {
        const r   = card.getBoundingClientRect();
        const dx  = (e.clientX - r.left - r.width  / 2) / (r.width  / 2);
        const dy  = (e.clientY - r.top  - r.height / 2) / (r.height / 2);
        // Clamp tilt to ±4deg and disable transition during move for snappiness
        card.style.transition = 'box-shadow .15s ease';
        card.style.transform  =
          `perspective(700px) rotateX(${(-dy * 4).toFixed(2)}deg) rotateY(${(dx * 4).toFixed(2)}deg) translateZ(4px)`;
      });

      card.addEventListener('mouseleave', () => {
        // Let CSS transition handle the spring-back
        card.style.transition =
          'box-shadow .15s ease, transform .5s cubic-bezier(0.34, 1.56, 0.64, 1)';
        card.style.transform = 'perspective(700px) rotateX(0deg) rotateY(0deg) translateZ(0)';
      });
    });

       BURST DOTS ON CLICK
    ═══════════════════════════════════════════════════ */
    const BURST_COLORS = ['#C8F135','#FF4D1C','#1A1AFF','#FFD600','#FF9ECD','#0E0E0E'];

    document.querySelectorAll('.card, .cta-btn').forEach(el => {
      el.addEventListener('pointerdown', e => {
        const n = 7;
        for (let i = 0; i < n; i++) {
          const dot   = document.createElement('div');
          dot.className = 'burst-dot';
          dot.style.background = BURST_COLORS[Math.floor(Math.random() * BURST_COLORS.length)];
          dot.style.left = e.clientX + 'px';
          dot.style.top  = e.clientY + 'px';
          document.body.appendChild(dot);

          const angle = (Math.PI * 2 / n) * i + Math.random() * .4;
          const dist  = 30 + Math.random() * 50;

          dot.animate([
            { transform: 'translate(-50%,-50%) scale(1)', opacity: 1 },
            { transform: `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px)) scale(0)`, opacity: 0 }
          ], {
            duration: 400 + Math.random() * 150,
            easing: 'cubic-bezier(.25,1,.5,1)'
          }).onfinish = () => dot.remove();
        }
      });
    });
